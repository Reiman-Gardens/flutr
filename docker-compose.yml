services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flutr-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev --hostname 0.0.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flutr-db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm db:studio --host 0.0.0.0
    restart: unless-stopped
    ports:
      - "4983:4983"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flutr-db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_node_modules:
